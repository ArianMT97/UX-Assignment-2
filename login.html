<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>

  <!-- Bootstrap 5.3.3 from https://getbootstrap.com -->
 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
</head>

<body class="login-page">

  <header>
    <h2><a href="index.html">Go2travelplanner</a></h2>

    <nav>
      <a href="index.html">Home</a>
      <a href="cities.html">Cities</a>
      <a href="comingsoon.html">Daily Activities</a>
      <a href="trips.html">My Trips</a>
      <a href="login.html" class="active">Login</a>
    </nav>
  </header>

  <main>

    <section class="login-section">

      <div class="container mt-5">
        <div class="row justify-content-center">
          <div class="col-md-5">

            <h2 class="text-center mb-3">Create Account</h2>
            <p class="text-center text-muted">
              Join us and start planning your dream trips
            </p>

            <form action="comingsoon.html">

              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input 
                  type="text" 
                  class="form-control" 
                  name="fullname"
                  autocomplete="name"
                  placeholder="Enter your full name"
                  required>
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input 
                  type="email" 
                  class="form-control" 
                  name="email"
                  autocomplete="email"
                  placeholder="Enter your email"
                  required>
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input 
                  type="password" 
                  class="form-control" 
                  name="password"
                  autocomplete="new-password"
                  placeholder="Create a password"
                  minlength="6"
                  required>
              </div>

              <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input 
                  type="password" 
                  class="form-control" 
                  name="confirm-password"
                  autocomplete="new-password"
                  placeholder="Confirm your password"
                  minlength="6"
                  required>
              </div>

              <button type="submit" class="btn btn-primary w-100">Create Account</button>

              <p class="text-center mt-3">
                Already have an account? <a href="signin.html">Sign in</a>
              </p>

            </form>

          </div>
        </div>
      </div>

    </section>

  </main>

</body>
</html>
